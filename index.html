<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 2.5D Frame Studio PRO</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="module">
        import { pipeline, env } from 'https://cdn.jsdelivr.net/npm/@huggingface/transformers';
        
        // Mobile WASM stability parameters
        env.backends.onnx.wasm.numThreads = 1; 
        env.backends.onnx.wasm.simd = false; 
        env.backends.onnx.wasm.proxy = false; 

        window.briaPipeline = null;

        async function initAI() {
            const statusEl = document.getElementById('ai_status');
            try {
                window.briaPipeline = await pipeline('background-removal', 'onnx-community/ormbg-ONNX');
                statusEl.innerHTML = '<span class="flex items-center justify-center gap-2"><span class="w-2 h-2 rounded-full bg-emerald-400 animate-ping"></span>⚡ AI Engine Armed & Ready</span>';
                statusEl.className = "text-emerald-400 mt-2 text-xs font-bold uppercase tracking-widest";
            } catch (err) {
                statusEl.innerText = "❌ Engine Error. Check Console.";
                statusEl.className = "text-rose-500 mt-2 text-xs font-bold";
                console.error(err);
            }
        }
        window.addEventListener('DOMContentLoaded', initAI);
    </script>
    <style>
        .glass-panel {
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        .checkered-bg {
            background-color: #020617;
            background-image: linear-gradient(45deg, #0f172a 25%, transparent 25%), 
                              linear-gradient(-45deg, #0f172a 25%, transparent 25%), 
                              linear-gradient(45deg, transparent 75%, #0f172a 75%), 
                              linear-gradient(-45deg, transparent 75%, #0f172a 75%);
            background-size: 16px 16px;
            background-position: 0 0, 0 8px, 8px -8px, 8px 0px;
        }
    </style>
</head>
<body class="bg-slate-950 text-slate-100 font-sans min-h-screen flex flex-col items-center p-4 md:p-8 select-none relative overflow-x-hidden">

    <div id="progress_overlay" class="fixed inset-0 z-50 bg-slate-950/90 backdrop-blur-sm hidden flex-col items-center justify-center transition-opacity">
        <div class="glass-panel p-8 rounded-3xl w-11/12 max-w-md text-center shadow-[0_0_40px_rgba(6,182,212,0.15)] border border-cyan-500/20">
            <div class="inline-block p-4 rounded-full bg-cyan-500/10 mb-4">
                <div class="animate-spin h-10 w-10 border-4 border-cyan-500 border-t-transparent rounded-full"></div>
            </div>
            <h3 class="text-xl font-black text-white mb-2">AI Processing</h3>
            <p id="progress_text" class="text-cyan-400 text-sm font-semibold mb-6">Initiating deep edge isolation...</p>
            
            <div class="w-full bg-slate-800 rounded-full h-3 overflow-hidden border border-slate-700">
                <div id="progress_bar" class="bg-gradient-to-r from-cyan-400 to-blue-500 h-3 rounded-full transition-all duration-500 ease-out" style="width: 0%"></div>
            </div>
            <p id="progress_percent" class="text-slate-400 text-xs mt-3 font-mono">0%</p>
        </div>
    </div>

    <div class="max-w-6xl w-full space-y-8 z-10 relative">
        <header class="text-center pt-4">
            <h1 class="text-4xl md:text-5xl font-black tracking-tighter bg-gradient-to-r from-cyan-400 via-blue-400 to-indigo-400 bg-clip-text text-transparent drop-shadow-sm">
                AI Frame Studio
            </h1>
            <p id="ai_status" class="text-amber-400 mt-3 text-xs font-bold uppercase tracking-widest animate-pulse">⏳ Booting Neural Engine...</p>
        </header>

        <div class="glass-panel rounded-3xl p-6 md:p-8 mx-auto shadow-2xl space-y-6">
            <div class="flex flex-col md:flex-row items-center justify-between gap-6">
                <div class="text-center md:text-left">
                    <h3 class="font-bold text-slate-100 text-lg">Master Scale Factor</h3>
                    <p class="text-xs text-slate-400 mt-1">Adjusts output dimensions for the final sheet</p>
                </div>
                <div class="grid grid-cols-5 gap-2 bg-slate-900/50 p-2 rounded-2xl border border-slate-800 shadow-inner">
                    <button onclick="setSizeLevel(1)" id="btn_lvl_1" class="size-btn px-4 py-2 rounded-xl font-bold transition text-xs bg-slate-800 text-slate-400 hover:bg-slate-700">L1</button>
                    <button onclick="setSizeLevel(2)" id="btn_lvl_2" class="size-btn px-4 py-2 rounded-xl font-bold transition text-xs bg-cyan-600 shadow-[0_0_15px_rgba(8,145,178,0.4)] text-white">L2</button>
                    <button onclick="setSizeLevel(3)" id="btn_lvl_3" class="size-btn px-4 py-2 rounded-xl font-bold transition text-xs bg-slate-800 text-slate-400 hover:bg-slate-700">L3</button>
                    <button onclick="setSizeLevel(4)" id="btn_lvl_4" class="size-btn px-4 py-2 rounded-xl font-bold transition text-xs bg-slate-800 text-slate-400 hover:bg-slate-700">L4</button>
                    <button onclick="setSizeLevel(5)" id="btn_lvl_5" class="size-btn px-4 py-2 rounded-xl font-bold transition text-xs bg-slate-800 text-slate-400 hover:bg-slate-700">L5</button>
                </div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-4 pt-4 border-t border-slate-800/50">
                <button onclick="generateCompositeSheet()" class="w-full bg-gradient-to-r from-cyan-500 to-blue-600 hover:from-cyan-400 hover:to-blue-500 text-slate-950 font-black py-4 rounded-2xl shadow-[0_0_20px_rgba(6,182,212,0.3)] transition transform active:scale-[0.98] cursor-pointer text-sm uppercase tracking-widest flex items-center justify-center gap-2">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M19.428 15.428a2 2 0 00-1.022-.547l-2.387-.477a6 6 0 00-3.86.517l-.318.158a6 6 0 01-3.86.517L6.05 15.21a2 2 0 00-1.806.547M8 4h8l-1 1v5.172a2 2 0 00.586 1.414l5 5c1.26 1.26.367 3.414-1.415 3.414H4.828c-1.782 0-2.674-2.154-1.414-3.414l5-5A2 2 0 009 10.172V5L8 4z"></path></svg>
                    Run AI & Generate
                </button>
                <button id="download_btn" onclick="downloadSheet()" disabled class="w-full bg-slate-900 text-slate-600 font-black py-4 rounded-2xl transition text-sm uppercase tracking-widest border border-slate-800 cursor-not-allowed flex items-center justify-center gap-2">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path></svg>
                    Save Transparent PNG
                </button>
            </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
            <div class="glass-panel rounded-3xl p-5 flex flex-col items-center shadow-lg relative group">
                <div class="absolute inset-0 bg-gradient-to-b from-cyan-500/5 to-transparent rounded-3xl pointer-events-none"></div>
                <span class="text-xs font-black uppercase tracking-widest text-cyan-400 mb-3 drop-shadow-md">1. Front Lens</span>
                <div class="relative w-full aspect-[4/3] bg-slate-900 rounded-2xl flex items-center justify-center border-2 border-dashed border-slate-700 overflow-hidden group-hover:border-cyan-500/50 transition duration-300">
                    <canvas id="canvas_front" class="max-w-full max-h-full object-contain checkered-bg"></canvas>
                    <label class="absolute inset-0 flex flex-col items-center justify-center bg-slate-950/40 cursor-pointer p-4 text-center hover:bg-slate-950/20 transition opacity-100">
                        <span id="label_front" class="text-sm text-slate-200 font-bold bg-slate-900/80 px-4 py-2 rounded-full border border-slate-700 backdrop-blur">📥 Stage Photo</span>
                        <input type="file" accept="image/*" class="hidden" onchange="handleStagingUpload(event, 'front')">
                    </label>
                </div>
            </div>

            <div class="glass-panel rounded-3xl p-5 flex flex-col items-center shadow-lg relative group">
                <div class="absolute inset-0 bg-gradient-to-b from-blue-500/5 to-transparent rounded-3xl pointer-events-none"></div>
                <span class="text-xs font-black uppercase tracking-widest text-blue-400 mb-3 drop-shadow-md">2. Left Stick</span>
                <div class="relative w-full aspect-[4/3] bg-slate-900 rounded-2xl flex items-center justify-center border-2 border-dashed border-slate-700 overflow-hidden group-hover:border-blue-500/50 transition duration-300">
                    <canvas id="canvas_left" class="max-w-full max-h-full object-contain checkered-bg"></canvas>
                    <label class="absolute inset-0 flex flex-col items-center justify-center bg-slate-950/40 cursor-pointer p-4 text-center hover:bg-slate-950/20 transition opacity-100">
                        <span id="label_left" class="text-sm text-slate-200 font-bold bg-slate-900/80 px-4 py-2 rounded-full border border-slate-700 backdrop-blur">📥 Stage Photo</span>
                        <input type="file" accept="image/*" class="hidden" onchange="handleStagingUpload(event, 'left')">
                    </label>
                </div>
            </div>

            <div class="glass-panel rounded-3xl p-5 flex flex-col items-center shadow-lg relative group">
                <div class="absolute inset-0 bg-gradient-to-b from-indigo-500/5 to-transparent rounded-3xl pointer-events-none"></div>
                <span class="text-xs font-black uppercase tracking-widest text-indigo-400 mb-3 drop-shadow-md">3. Right Stick</span>
                <div class="relative w-full aspect-[4/3] bg-slate-900 rounded-2xl flex items-center justify-center border-2 border-dashed border-slate-700 overflow-hidden group-hover:border-indigo-500/50 transition duration-300">
                    <canvas id="canvas_right" class="max-w-full max-h-full object-contain checkered-bg"></canvas>
                    <label class="absolute inset-0 flex flex-col items-center justify-center bg-slate-950/40 cursor-pointer p-4 text-center hover:bg-slate-950/20 transition opacity-100">
                        <span id="label_right" class="text-sm text-slate-200 font-bold bg-slate-900/80 px-4 py-2 rounded-full border border-slate-700 backdrop-blur">📥 Stage Photo</span>
                        <input type="file" accept="image/*" class="hidden" onchange="handleStagingUpload(event, 'right')">
                    </label>
                </div>
            </div>
        </div>

        <div class="glass-panel rounded-3xl p-6 max-w-4xl mx-auto space-y-4 shadow-2xl relative">
            <div class="text-center pb-2">
                <h4 class="text-xs font-black uppercase tracking-widest text-emerald-400">Master Output Canvas</h4>
            </div>
            <div class="bg-slate-950 rounded-2xl p-2 flex items-center justify-center border border-slate-800 min-h-[400px] checkered-bg shadow-inner">
                <canvas id="master_composite_canvas" class="max-w-full rounded-xl"></canvas>
            </div>
        </div>
    </div>

    <script>
        // Stored references for raw user uploads
        const rawImages = { front: null, left: null, right: null };
        const rawDataUrls = { front: null, left: null, right: null };
        
        // Massive Scale Up: Level 2 is now old Level 4 sizes
        const sizeMultipliers = { 1: 0.8, 2: 1.25, 3: 1.5, 4: 1.8, 5: 2.2 };
        let currentLevel = 2;

        function setSizeLevel(level) {
            currentLevel = level;
            document.querySelectorAll('.size-btn').forEach(btn => {
                btn.className = "size-btn px-4 py-2 rounded-xl font-bold transition text-xs bg-slate-800 text-slate-400 hover:bg-slate-700";
            });
            let activeBtn = document.getElementById(`btn_lvl_${level}`);
            activeBtn.className = "size-btn px-4 py-2 rounded-xl font-bold transition text-xs bg-cyan-600 shadow-[0_0_15px_rgba(8,145,178,0.4)] text-white";
        }

        // PREVIEW ONLY: Does NOT trigger AI. Just paints the image for preview.
        function handleStagingUpload(event, perspective) {
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(e) {
                const img = new Image();
                img.onload = function() {
                    rawImages[perspective] = img;
                    rawDataUrls[perspective] = e.target.result;
                    
                    // Hide the upload label so image is visible
                    const label = document.getElementById(`label_${perspective}`);
                    label.innerHTML = "✅ Staged";
                    label.parentElement.classList.remove('bg-slate-950/40', 'opacity-100');
                    label.parentElement.classList.add('opacity-0', 'hover:opacity-100');

                    // Fast Preview draw
                    const canvas = document.getElementById(`canvas_${perspective}`);
                    const ctx = canvas.getContext('2d');
                    canvas.width = 600; canvas.height = 450;
                    ctx.clearRect(0, 0, 600, 450);
                    
                    // Fit math
                    const aspect = img.width / img.height;
                    let targetW = 600 * 0.9;
                    let targetH = targetW / aspect;
                    if (targetH > 450 * 0.9) {
                        targetH = 450 * 0.9;
                        targetW = targetH * aspect;
                    }
                    ctx.drawImage(img, (600 - targetW) / 2, (450 - targetH) / 2, targetW, targetH);
                };
                img.src = e.target.result;
            };
            reader.readAsDataURL(file);
        }

        // AGGRESSIVE CROPPING: Slices off unwanted sticks or front frames dynamically
        function applyStrictOcclusionCrop(ctx, perspective, w, h) {
            ctx.save();
            ctx.globalCompositeOperation = 'destination-out';
            ctx.fillStyle = 'black';
            
            if (perspective === 'front') {
                // Erase left 12% and right 12% to chop off folded sticks
                ctx.fillRect(0, 0, w * 0.12, h); 
                ctx.fillRect(w * 0.88, 0, w * 0.12, h); 
            } 
            else if (perspective === 'left') {
                // Erase right 50% (cuts out the front frame hinge attachment)
                ctx.fillRect(w * 0.50, 0, w * 0.50, h); 
            } 
            else if (perspective === 'right') {
                // Erase left 50% (cuts out the front frame hinge attachment)
                ctx.fillRect(0, 0, w * 0.50, h);       
            }
            ctx.restore();
        }

        // Progress UI Controller
        const uiProgress = {
            overlay: document.getElementById('progress_overlay'),
            text: document.getElementById('progress_text'),
            bar: document.getElementById('progress_bar'),
            percent: document.getElementById('progress_percent'),
            show: function() { this.overlay.classList.remove('hidden'); this.overlay.classList.add('flex'); },
            hide: function() { this.overlay.classList.remove('flex'); this.overlay.classList.add('hidden'); },
            update: function(msg, val) {
                this.text.innerText = msg;
                this.bar.style.width = `${val}%`;
                this.percent.innerText = `${val}%`;
            }
        };

        // Master Generation function (Triggered on Button Click)
        async function generateCompositeSheet() {
            if (!window.briaPipeline) {
                alert("AI Engine is still booting. Please wait a second.");
                return;
            }

            // Check if at least one image exists
            if (!rawImages.front && !rawImages.left && !rawImages.right) {
                alert("Please stage at least one photo first!");
                return;
            }

            uiProgress.show();
            let step = 0;
            const totalSteps = ['front', 'left', 'right'].filter(p => rawImages[p] !== null).length;
            let currentPct = 5;
            uiProgress.update("Waking up V3 AI Engine...", currentPct);

            // Process each staged image
            for (const perspective of ['front', 'left', 'right']) {
                if (rawImages[perspective]) {
                    currentPct = 10 + (step * (90 / totalSteps));
                    uiProgress.update(`Segmenting ${perspective.toUpperCase()} view...`, Math.floor(currentPct));
                    
                    await processCanvasWithAI(perspective);
                    step++;
                }
            }

            uiProgress.update("Finalizing Layout...", 98);

            // Compile everything onto the master sheet
            compileMasterSheet();

            setTimeout(() => {
                uiProgress.update("Complete!", 100);
                setTimeout(() => uiProgress.hide(), 400);
            }, 300);
        }

        async function processCanvasWithAI(perspective) {
            const baseDataUrl = rawDataUrls[perspective];
            const canvas = document.getElementById(`canvas_${perspective}`);
            const ctx = canvas.getContext('2d', { willReadFrequently: true });
            
            const baseW = 600, baseH = 450;
            const img = rawImages[perspective];
            
            const aspect = img.width / img.height;
            let targetW = baseW * 0.9;
            let targetH = targetW / aspect;
            if (targetH > baseH * 0.9) {
                targetH = baseH * 0.9;
                targetW = targetH * aspect;
            }
            const x = (baseW - targetW) / 2;
            const y = (baseH - targetH) / 2;

            try {
                // Execute heavy AI pipeline dynamically
                const result = await window.briaPipeline(baseDataUrl);
                const rawImage = Array.isArray(result) ? result[0] : result;
                const maskCanvas = rawImage.toCanvas();
                
                // Redraw slot cleanly with isolated output
                ctx.clearRect(0, 0, baseW, baseH);
                ctx.drawImage(maskCanvas, x, y, targetW, targetH);
                
                // Apply strict edge chopping!
                applyStrictOcclusionCrop(ctx, perspective, baseW, baseH);

            } catch (err) {
                console.error(`AI Segmentation Failed on ${perspective}: `, err);
                // Fallback draw if failure
                ctx.clearRect(0, 0, baseW, baseH);
                ctx.drawImage(img, x, y, targetW, targetH);
            }
        }

        function compileMasterSheet() {
            const masterCanvas = document.getElementById('master_composite_canvas');
            const mCtx = masterCanvas.getContext('2d');

            const sheetW = 1200, sheetH = 900;
            masterCanvas.width = sheetW;
            masterCanvas.height = sheetH;
            mCtx.clearRect(0, 0, sheetW, sheetH);

            const slotW = 500, slotH = 375;
            const scale = sizeMultipliers[currentLevel];
            let layersDrawn = 0;

            ['front', 'left', 'right'].forEach(perspective => {
                const srcCanvas = document.getElementById(`canvas_${perspective}`);
                if (rawImages[perspective] && srcCanvas) {
                    layersDrawn++;
                    let posX = 0, posY = 0;
                    if (perspective === 'front') { posX = (sheetW - (slotW * scale)) / 2; posY = 40; }
                    else if (perspective === 'left') { posX = 20; posY = 480; }
                    else if (perspective === 'right') { posX = sheetW - (slotW * scale) - 20; posY = 480; }

                    mCtx.drawImage(srcCanvas, 0, 0, srcCanvas.width, srcCanvas.height, posX, posY, slotW * scale, slotH * scale);
                }
            });

            if (layersDrawn > 0) {
                const dlBtn = document.getElementById('download_btn');
                dlBtn.disabled = false;
                dlBtn.className = "w-full bg-emerald-500 hover:bg-emerald-400 text-slate-950 font-black py-4 rounded-2xl shadow-[0_0_20px_rgba(16,185,129,0.3)] transition transform active:scale-[0.98] cursor-pointer text-sm uppercase tracking-widest flex items-center justify-center gap-2";
            }
        }

        function downloadSheet() {
            const masterCanvas = document.getElementById('master_composite_canvas');
            const virtualAnchor = document.createElement('a');
            virtualAnchor.download = 'AI_Frame_Sheet_Master.png';
            virtualAnchor.href = masterCanvas.toDataURL("image/png");
            virtualAnchor.click();
        }
    </script>
</body>
</html>
